let bottles = [], cocktails = [];
let state = { page:'collection', view:'grid', lang:'tr', search:'', cat:'', country:'', sort:'name', selBottle:null, selCocktail:null };

// ── HASH ROUTING ──────────────────────────────────────────────────────────
function updateHash(){
  let hash = '';
  if(state.selCocktail) hash = 'cocktail/' + state.selCocktail.id;
  else if(state.selBottle) hash = 'bottle/' + state.selBottle.slug;
  else if(state.page !== 'collection') hash = state.page;
  const newHash = hash ? '#' + hash : location.pathname;
  if(location.hash !== (hash ? '#'+hash : '')) {
    history.pushState(null, '', hash ? '#'+hash : location.pathname + location.search);
  }
}

function restoreFromHash(){
  const hash = location.hash.replace('#','');
  if(!hash) return;
  if(hash.startsWith('bottle/')){
    const slug = hash.replace('bottle/','');
    const b = bottles.find(x=>x.slug===slug);
    if(b){ state.selBottle=b; state.selCocktail=null; }
  } else if(hash.startsWith('cocktail/')){
    const id = parseInt(hash.replace('cocktail/',''));
    const c = cocktails.find(x=>x.id===id);
    if(c){ state.selCocktail=c; }
  } else if(['cocktails','extras'].includes(hash)){
    state.page = hash;
  }
}

window.addEventListener('popstate', ()=>{
  // Re-parse hash on back/forward
  state.selBottle=null; state.selCocktail=null; state.page='collection';
  restoreFromHash();
  render();
  updateHash();
});

    const [b, c, cats] = await Promise.all([
      fetch('/data/bottles.json').then(r=>r.json()),
      fetch('/data/cocktails.json').then(r=>r.json()),
      fetch('/data/categories.json').then(r=>r.json()).catch(()=>({items:[]}))
    ]);
    bottles = (b.items || b).filter(x => x.active !== false);
    cocktails = (c.items || c).filter(x => x.active !== false);
    categories = (cats.items || cats || []);
  } catch(e) { console.error('Load error:', e); }
  restoreFromHash();
  render();
  updateHash();
}

function abvFmt(abv){
  if(!abv) return '';
  abv = String(abv).trim();
  if(!abv.includes('%')) abv += '%';
  return abv;
}

function sortBottles(list, sortBy) {
  const sorted = [...list];
  if (sortBy === 'category') {
    sorted.sort((a, b) => {
      const ca = catName(a.category) || '';
      const cb = catName(b.category) || '';
      if (ca !== cb) return ca.localeCompare(cb, 'tr');
      return (a.name || '').localeCompare(b.name || '', 'tr');
    });
  } else {
    // default: name
    sorted.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'tr'));
  }
  return sorted;
}

function abvFmt(v){
  if(!v) return '';
  v = String(v).trim();
  if(!v.includes('%')) v += '%';
  return v;
}

function catName(en) {
  if (!en) return en;
  const cat = categories.find(c => c.name_en === en);
  if (!cat) return en;
  return state.lang === 'tr' ? (cat.name_tr || en) : en;
}

function setState(p){
  Object.assign(state,p);
  render();
  updateHash();
}
function t(tr,en){ return state.lang==='tr'?tr:en; }
function cocktailsFor(slug){ return cocktails.filter(c=>c.slugs&&c.slugs.includes(slug)); }
function bottleFor(slug){ return bottles.find(b=>b.slug===slug); }

function svgChevRight(){ return `<svg width="14" height="14" fill="none" stroke="#4a6490" stroke-width="2.5" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>`; }
function svgChevLeft(){ return `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>`; }
function svgClock(){ return `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="vertical-align:middle"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`; }
function svgSwap(){ return `<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4 4 4M17 8v12m0 0 4-4m-4 4-4-4"/></svg>`; }
function svgDM(){ return `<svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`; }
function svgCocktail(){ return `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 22h8M12 11v11M3 3l9 8 9-8H3z"/></svg>`; }

      ${b.qty>1?`<span class="badge-qty">×${b.qty}</span>`:''}
      <span class="badge-abv">${abvFmt(b.abv)}</span>

  const diff=state.lang==='tr'?c.diff:c.diff_en;
  return `<div class="ccard" onclick="openCocktail(${c.id})">
    <div class="ccard-img">
      <img src="${c.image}" alt="${c.name}" loading="lazy"/>
      <div class="overlay"></div>
      <span style="position:absolute;top:10px;left:10px;background:rgba(13,30,66,.9);font-size:10px;padding:3px 8px;border-radius:8px;backdrop-filter:blur(4px)" class="${c.diff==='Kolay'?'diff-easy':'diff-mid'}">${diff}</span>
      <span style="position:absolute;top:10px;right:10px;background:rgba(6,14,40,.85);color:#8aaad8;font-size:10px;padding:3px 8px;border-radius:8px;backdrop-filter:blur(4px)">${svgClock()} ${c.time}</span>
    </div>
    <div class="ccard-body">
      <div class="ccard-name">${c.name}</div>
      <div class="ccard-bottles">${(c.slugs||[]).map(s=>bottleFor(s)?.name).filter(Boolean).join(' · ')}</div>
    </div>

}

function renderSearchBar(ph){
  return `<div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" value="${state.search}" placeholder="${ph}" oninput="onSearch(this.value)"/>
  </div>`;
}

function renderCollectionPage(extrasOnly){
  const base=extrasOnly?bottles.filter(b=>b.qty>1):bottles;
  const q=state.search.toLowerCase();
  const filtered=base.filter(b=>{
    const m=!q||[b.name,b.country,b.category,b.desc_tr||'',b.desc_en||''].some(s=>s.toLowerCase().includes(q));
    return m&&(!state.cat||b.category===state.cat)&&(!state.country||b.country===state.country);
  });

  return `
    ${extrasOnly?`<div class="extras-banner">
      <div>
        <div class="extras-title">${t('Takas & Fazlalıklar','For Trade & Extras')}</div>
        <div class="extras-sub">${t('Koleksiyonumda birden fazla bulunan şişeler. Takas için Instagram\'dan DM atabilirsiniz.','Bottles I have more than one of. DM me on Instagram to discuss trades.')}</div>
      </div>
      <a href="${IG_DM}" target="_blank" rel="noopener noreferrer" class="extras-dm">${svgDM()} ${t('DM Gönder','Send DM')}</a>
    </div>`:''}
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
      ${renderSearchBar(t('İsim, ülke, kategori ara…','Search name, country, category…'))}
      <div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap">
        <div style="position:relative">
          <select onchange="setCat(this.value)" style="padding:11px 36px 11px 14px;background:#091530;border:1px solid ${state.cat?'#d4a843':'#1a2e5a'};border-radius:12px;color:${state.cat?'#d4a843':'#8aaad8'};font-size:13px;font-family:inherit;appearance:none;cursor:pointer;min-width:140px">
            <option value="">${t('Tüm Kategoriler','All Categories')}</option>
            ${[...new Set(bottles.map(b=>b.category).filter(Boolean))].sort((a,b)=>catName(a).localeCompare(catName(b),'tr')).map(c=>`<option value="${c}" ${state.cat===c?'selected':''}>${catName(c)}</option>`).join('')}
          </select>
          <svg style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:${state.cat?'#d4a843':'#4a6490'}" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div style="position:relative">
          <select onchange="setCtr(this.value)" style="padding:11px 36px 11px 14px;background:#091530;border:1px solid ${state.country?'#5b8fff':'#1a2e5a'};border-radius:12px;color:${state.country?'#5b8fff':'#8aaad8'};font-size:13px;font-family:inherit;appearance:none;cursor:pointer;min-width:140px">
            <option value="">${t('Tüm Ülkeler','All Countries')}</option>
            ${[...new Set(bottles.map(b=>b.country).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'tr')).map(c=>`<option value="${c}" ${state.country===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <svg style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:${state.country?'#5b8fff':'#4a6490'}" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div style="position:relative">
          <select onchange="setState({sort:this.value})" style="padding:11px 36px 11px 14px;background:#091530;border:1px solid #1a2e5a;border-radius:12px;color:#8aaad8;font-size:13px;font-family:inherit;appearance:none;cursor:pointer;min-width:130px">
            <option value="name" ${state.sort==='name'?'selected':''}>${t('İsme Göre','By Name')}</option>
            <option value="category" ${state.sort==='category'?'selected':''}>${t('Kategoriye Göre','By Category')}</option>
          </select>
          <svg style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:#4a6490" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        ${(state.cat||state.country)?`<button onclick="setCat('');setCtr('')" style="padding:11px 14px;background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.25);border-radius:12px;color:#e05c5c;font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap">${t('Temizle','Clear')}</button>`:''}
      </div>
    </div>
    <div class="count">${filtered.length} ${t('şişe','bottle')}${filtered.length!==1&&state.lang==='en'?'s':''}${state.cat?` · <span>${catName(state.cat)}</span>`:''}${state.country?` · <span>${flagImg(state.country)} ${state.country}</span>`:''}${q?` · <span>"${state.search}"</span>`:''}</div>
    ${state.view==='grid'?`<div class="grid">${filtered.map(renderBottleCard).join('')}</div>`:`<div class="list-view">${filtered.map(renderBottleRow).join('')}</div>`}
    ${filtered.length===0?`<div class="empty"><div class="empty-icon">🫗</div><div class="empty-text">${t('Sonuç bulunamadı','No results found')}</div></div>`:''}`;
}

function renderBottleDetail(b){
  const related=cocktailsFor(b.slug);
  const desc=state.lang==='tr'?b.desc_tr:b.desc_en;
  return `<div class="detail">
    <button class="back-btn" onclick="goBack()">${svgChevLeft()} ${t('Koleksiyona Dön','Back to Collection')}</button>
    <div class="detail-grid">
      <div class="detail-img">
        <img src="${b.image}" alt="${b.name}"/>
        ${b.qty>1?`<div style="position:absolute;top:14px;right:14px;background:rgba(6,14,40,.9);color:#d4a843;font-size:13px;padding:5px 12px;border-radius:10px;font-weight:700;backdrop-filter:blur(4px)">×${b.qty} adet</div>`:''}
      </div>
      <div>
        <div class="detail-badges">
          <span class="tag-blue" style="font-size:11px;padding:4px 10px;border-radius:8px">${catName(b.category)}</span>

          ${b.qty>1?`<span class="tag-green" style="font-size:11px;padding:4px 10px;border-radius:8px">${svgSwap()} ${t("TAKAS","TRADE")}</span>`:''}
        </div>
        <h1 class="detail-title">${b.name}</h1>
        <div class="detail-sub">${flagImg(b.country)} ${b.country} · ${b.year}</div>
        <p class="detail-desc">${desc||''}</p>
        ${b.qty>1?`<a href="${IG_DM}" target="_blank" rel="noopener noreferrer" class="dm-btn">${svgDM()} ${t('Takas için DM at','DM to Trade')}</a>`:''}
        ${related.length>0?`
          <div class="section-label">${t('Bu şişeyle yapılan kokteyller','Cocktails with this bottle')}</div>
          ${related.map(c=>`<div class="rel-cocktail" onclick="openCocktail(${c.id})">
            <img src="${c.image}" alt="${c.name}"/>
            <div class="rel-cocktail-info">
              <div class="rel-cocktail-name">${c.name}</div>
              <div class="rel-cocktail-meta">
                <span class="${c.diff==='Kolay'?'diff-easy':'diff-mid'}">${state.lang==='tr'?c.diff:c.diff_en}</span>
                <span>${svgClock()} ${c.time}</span>
              </div>
            </div>
            ${svgChevRight()}
          </div>`).join('')}`:''}
      </div>
    </div>

}

function renderCocktailDetail(c){
  const ings=state.lang==='tr'?c.ing_tr:c.ing_en;
  const steps=state.lang==='tr'?c.steps_tr:c.steps_en;
  const diff=state.lang==='tr'?c.diff:c.diff_en;
  const relBottles=(c.slugs||[]).map(bottleFor).filter(Boolean);
  return `<div class="detail">
    <button class="back-btn" onclick="goBack()">${svgChevLeft()} ${t('Kokteyllere Dön','Back to Cocktails')}</button>
    <div class="detail-grid">
      <div class="detail-img"><img src="${c.image}" alt="${c.name}" style="aspect-ratio:4/3"/></div>
      <div>
        <div class="detail-badges">
          <span style="background:${c.diff==='Kolay'?'rgba(82,201,122,.12)':'rgba(212,168,67,.14)'};color:${c.diff==='Kolay'?'#52c97a':'#d4a843'};font-size:11px;padding:4px 10px;border-radius:8px">${diff}</span>
          <span class="tag-blue" style="font-size:11px;padding:4px 10px;border-radius:8px">${svgClock()} ${c.time}</span>
        </div>
        <h1 class="detail-title">${c.name}</h1>
        <div class="section-label" style="margin-top:20px">${t('Malzemeler','Ingredients')}</div>
        <div style="margin-bottom:20px">${(ings||[]).map(i=>`<div class="ingredient-row"><span class="ingredient-dot"></span><span style="font-size:13px;color:#c8d8f0">${i}</span></div>`).join('')}</div>
        <div class="section-label">${t('Hazırlanış','Instructions')}</div>
        <div style="margin-bottom:24px">${(steps||[]).map((s,i)=>`<div class="step-row"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`).join('')}</div>
        ${relBottles.length>0?`
          <div class="section-label">${t('Kullanılan şişeler','Bottles used')}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${relBottles.map(b=>`<div class="rel-bottle" onclick="openBottleFromCocktail('${b.slug}')"><img src="${b.image}" alt="${b.name}"/><span>${b.name}</span></div>`).join('')}
          </div>`:''}
      </div>
    </div>
  </div>`;
}

function renderCocktailsPage(){
  const q=state.search.toLowerCase();
  const filtered=cocktails.filter(c=>!q||c.name.toLowerCase().includes(q)||(c.ing_tr||[]).some(i=>i.toLowerCase().includes(q)));
  return `<div class="fade">
    <div class="page-title">${t('Kokteyl Tarifleri','Cocktail Recipes')}</div>
    <div class="page-sub">${t('Koleksiyonumdaki şişelerle hazırlanan özel tarifler','Special recipes made with bottles from my collection')}</div>
    ${renderSearchBar(t('Kokteyl veya malzeme ara…','Search cocktail or ingredient…'))}
    <div class="grid">${filtered.map(renderCocktailCard).join('')}</div>
    ${filtered.length===0?`<div class="empty"><div class="empty-icon">🍹</div><div class="empty-text">${t('Sonuç bulunamadı','No results found')}</div></div>`:''}
  </div>`;
}

function render(){
  // Update page title for analytics
  let title = 'Miniature Bottles 5cl';
  if(state.selBottle) title = state.selBottle.name + ' — ' + title;
  else if(state.selCocktail) title = state.selCocktail.name + ' — ' + title;
  else if(state.page==='cocktails') title = 'Kokteyller — ' + title;
  else if(state.page==='extras') title = 'Fazlalıklar — ' + title;
  document.title = title;
  ['collection','cocktails','extras'].forEach(p=>{
    const el=document.getElementById('nav-'+p);
    if(el){el.classList.toggle('active',state.page===p);el.textContent=el.dataset[state.lang];}
  });
  document.getElementById('btn-grid').classList.toggle('active',state.view==='grid');
  document.getElementById('btn-list').classList.toggle('active',state.view==='list');
  document.getElementById('btn-tr').classList.toggle('active',state.lang==='tr');
  document.getElementById('btn-en').classList.toggle('active',state.lang==='en');
  document.getElementById('footer-sub').textContent=t('Dünyanın dört bir yanından minyatür alkol şişeleri koleksiyonu.','A curated collection of miniature spirit bottles from around the world.');
  document.getElementById('ig-btn-text').textContent=t("Instagram'da Takip Et","Follow on Instagram");
  const main=document.getElementById('main-content');
  if(state.selCocktail){main.innerHTML=renderCocktailDetail(state.selCocktail);return;}
  if(state.selBottle){main.innerHTML=renderBottleDetail(state.selBottle);return;}
  if(state.page==='cocktails'){main.innerHTML=renderCocktailsPage();return;}
  main.innerHTML=`<div class="fade">${renderCollectionPage(state.page==='extras')}</div>`;
}

function setView(v){setState({view:v});}
function setLang(l){setState({lang:l});}
function goPage(p){setState({page:p,selBottle:null,selCocktail:null,search:'',cat:'',country:'',sort:'name'});window.scrollTo(0,0);}
function setCat(c){setState({cat:c});}
function setCtr(c){setState({country:c});}
function onSearch(v){
  state.search=v;
  const inp=document.getElementById('search-input');
  const pos=inp?inp.selectionStart:null;
  render();
  const inp2=document.getElementById('search-input');
  if(inp2){inp2.focus();try{if(pos!==null)inp2.setSelectionRange(pos,pos);}catch(e){}}
}
function openBottle(slug){setState({selBottle:bottles.find(b=>b.slug===slug),selCocktail:null});window.scrollTo(0,0);}
function openCocktail(id){setState({selCocktail:cocktails.find(c=>c.id===id)});window.scrollTo(0,0);}
function openBottleFromCocktail(slug){setState({selBottle:bottles.find(b=>b.slug===slug),selCocktail:null,page:'collection'});window.scrollTo(0,0);}
function goBack(){
  if(state.selCocktail){setState({selCocktail:null});}
  else{setState({selBottle:null});}
  window.scrollTo(0,0);
}

loadData();
