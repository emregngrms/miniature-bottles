<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://identity.netlify.com https://netlify-identity-widget.netlify.com; script-src 'self' 'unsafe-inline' https://identity.netlify.com https://netlify-identity-widget.netlify.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://*.netlify.com https://*.netlify.app;"/>
<title>Admin — Miniature Bottles</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060e28;--surface:#091530;--nav:#0a1838;--card:#0d1e42;--cardho:#102248;
  --border:#1a2e5a;--borderhi:#2a4a8a;
  --gold:#d4a843;--goldd:rgba(212,168,67,.14);
  --blue:#5b8fff;--blued:rgba(91,143,255,.14);
  --green:#52c97a;--greend:rgba(82,201,122,.12);
  --red:#e05c5c;--redd:rgba(224,92,92,.12);
  --text:#c8d8f0;--sub:#4a6490;--mid:#8aaad8;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Force hide Netlify Identity widget when admin is active */
body.admin-active [data-netlify-identity-widget],
body.admin-active .netlify-identity-widget,
body.admin-active iframe[src*="identity"],
body.admin-active iframe[src*="netlify-identity"] {
  display:none!important;
  visibility:hidden!important;
  opacity:0!important;
  pointer-events:none!important;
}
/* Hide signup in Netlify Identity widget */
[data-netlify-identity-modal] .tabs .tab:last-child,
[data-netlify-identity-modal] .btn-link,
.netlify-identity-widget-iframe { }

a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer}img{display:block}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;max-width:360px;width:100%;text-align:center}
.login-logo{font-size:22px;color:var(--gold);font-style:italic;margin-bottom:6px}
.login-sub{font-size:11px;color:var(--sub);letter-spacing:.18em;text-transform:uppercase;margin-bottom:32px}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#1a3a8a,#2d5fd4);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600}
#app{display:none;min-height:100vh;flex-direction:column}
header{background:var(--nav);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-logo{font-size:15px;color:var(--gold);font-style:italic}
.header-right{display:flex;align-items:center;gap:12px}
.site-link{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:5px}
.site-link:hover{color:var(--blue)}
.btn-logout{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:12px}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.layout{display:flex;flex:1}
aside{width:196px;flex-shrink:0;background:var(--nav);border-right:1px solid var(--border);padding:16px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--sub);font-size:13px;font-weight:500;cursor:pointer;border-left:3px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(91,143,255,.05)}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:var(--goldd)}
.nav-badge{margin-left:auto;background:var(--border);color:var(--mid);font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}
.nav-item.active .nav-badge{background:var(--goldd);color:var(--gold)}
.nav-sep{height:1px;background:var(--border);margin:8px 16px}
main{flex:1;padding:28px 32px;min-width:0}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;color:var(--text)}
.page-title span{color:var(--sub);font-size:13px;font-weight:400;margin-left:8px}
.btn{padding:9px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:all .15s;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#1a3a8a,#2d5fd4);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--mid)}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--redd);border:1px solid rgba(224,92,92,.25);color:var(--red)}
.btn-danger:hover{background:rgba(224,92,92,.2)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{padding:8px 12px 8px 36px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;width:240px}
.search-wrap input:focus{outline:none;border-color:var(--blue)}
.search-wrap input::placeholder{color:var(--sub)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--sub);pointer-events:none}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.trow{display:grid;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:12px;transition:background .12s}
.trow:last-child{border-bottom:none}
.trow:hover:not(.thead){background:var(--cardho)}
.thead{background:var(--surface);color:var(--sub);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.thead:hover{background:var(--surface)!important}
.bottle-cols{grid-template-columns:48px 1fr 110px 90px 50px 100px}
.cat-cols{grid-template-columns:1fr 1fr 80px 90px}
.cocktail-cols{grid-template-columns:48px 1fr 90px 70px 100px}
.row-img{width:40px;height:40px;border-radius:8px;object-fit:cover;background:var(--surface)}
.row-ph{width:40px;height:40px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:18px}
.rname{font-weight:600;color:var(--text);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rmeta{font-size:11px;color:var(--sub);margin-top:2px}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;white-space:nowrap}
.tag-b{background:var(--blued);color:var(--blue)}
.tag-g{background:var(--goldd);color:var(--gold)}
.tag-gr{background:var(--greend);color:var(--green)}
.qty-b{width:26px;height:26px;border-radius:50%;background:var(--goldd);color:var(--gold);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.row-acts{display:flex;gap:5px;justify-content:flex-end}
.empty{text-align:center;padding:48px 20px;color:var(--sub)}
.empty-ico{font-size:40px;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.stat-num{font-size:26px;font-weight:700;color:var(--gold);line-height:1}
.stat-lbl{font-size:11px;color:var(--sub);margin-top:3px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:620px;margin:auto}
.modal-hd{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-ttl{font-size:17px;font-weight:700;color:var(--text)}
.modal-x{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:17px;display:flex;align-items:center;justify-content:center}
.modal-x:hover{border-color:var(--red);color:var(--red)}
.modal-bd{padding:18px 24px}
.modal-ft{padding:0 24px 18px;display:flex;gap:8px;justify-content:flex-end}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg-full{grid-column:1/-1}
label{font-size:11px;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
input,select,textarea{padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:inherit;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
input::placeholder,textarea::placeholder{color:var(--sub)}
select option{background:var(--card)}
textarea{resize:vertical;min-height:72px;line-height:1.5}
.hint{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.4}
.slug-pv{font-size:11px;color:var(--blue);margin-top:3px}
.flag-pv{font-size:13px;margin-top:3px}
.img-up{border:2px dashed var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .15s}
.img-up:hover{border-color:var(--blue);background:var(--blued)}
.img-up input{display:none}
.img-pv{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:8px}
.img-up-txt{color:var(--sub);font-size:12px}
.img-up-txt strong{color:var(--blue)}
.confirm-box{background:var(--redd);border:1px solid rgba(224,92,92,.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--red)}
.section-ttl{font-size:11px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:8px;margin-top:4px}
.bottle-check-grid{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;padding:2px;min-width:0}
.bottle-check{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;width:100%;box-sizing:border-box}
.bottle-check:hover{border-color:var(--blue)}
.bottle-check.selected{border-color:var(--gold);background:var(--goldd)}
.bottle-check img{width:28px;height:28px;border-radius:5px;object-fit:cover;flex-shrink:0}
.bottle-check-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:8px;z-index:999;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .25s ease;max-width:300px}
.toast.ok{border-color:rgba(82,201,122,.4);color:var(--green)}
.toast.err{border-color:rgba(224,92,92,.4);color:var(--red)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade{animation:fadeIn .2s ease}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--sub)}
.security-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--greend);border:1px solid rgba(82,201,122,.2);border-radius:8px;font-size:11px;color:var(--green)}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;backdrop-filter:blur(2px)}
@media(max-width:768px){
  aside{display:flex;position:fixed;top:0;left:-210px;height:100vh;z-index:50;transition:left .25s ease;flex-direction:column}
  aside.open{left:0}
  #sidebar-overlay.visible{display:block}
  #hamburger{display:flex!important}
  .stats{grid-template-columns:1fr 1fr}
  .fg-grid{grid-template-columns:1fr}
  .bottle-cols{grid-template-columns:40px 1fr 70px 60px}
  .cat-cols{grid-template-columns:1fr 1fr 80px}
  .cocktail-cols{grid-template-columns:40px 1fr 80px}
  main{padding:16px}
  .search-wrap input{width:160px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Miniature Bottles</div>
    <div class="login-sub">Admin Panel</div>
    <div class="fg" style="margin-bottom:12px">
      <label style="text-align:left">E-posta</label>
      <input type="email" id="login-email" placeholder="e-posta" autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="fg" style="margin-bottom:20px">
      <label style="text-align:left">Şifre</label>
      <div style="position:relative">
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()"
          style="padding-right:44px"/>
        <button type="button" onclick="togglePass()" id="pass-eye"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#4a6490;cursor:pointer;font-size:16px;padding:0">
          👁
        </button>
      </div>
    </div>
    <div id="login-err" style="display:none;color:#e05c5c;font-size:13px;margin-bottom:12px;text-align:center"></div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Giriş Yap</button>
  </div>
</div>

<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="hamburger" onclick="toggleSidebar()" style="display:none;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--sub);flex-direction:column;gap:4px;cursor:pointer">
        <span style="display:block;width:18px;height:2px;background:currentColor;border-radius:2px"></span>
        <span style="display:block;width:18px;height:2px;background:currentColor;border-radius:2px"></span>
        <span style="display:block;width:18px;height:2px;background:currentColor;border-radius:2px"></span>
      </button>
      <div class="header-logo">🥃 Miniature Admin</div>
    </div>
    <div class="header-right">
      <div class="security-badge" title="Git Gateway ile sunucu taraflı doğrulama aktif">🔒 Güvenli</div>
      <a href="/" target="_blank" class="site-link">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Siteye Git
      </a>
      <button class="btn-logout" onclick="logout()">Çıkış</button>
    </div>
  </header>
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="layout">
    <aside>
      <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-sep"></div>
      <div class="nav-item" id="nav-bottles" onclick="showPage('bottles')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3h6l1 7H8L9 3z"/><path d="M8 10s-2 2-2 6a6 6 0 0 0 12 0c0-4-2-6-2-6"/></svg>
        Şişeler
        <span class="nav-badge" id="badge-bottles">0</span>
      </div>
      <div class="nav-item" id="nav-categories" onclick="showPage('categories')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h8"/></svg>
        Kategoriler
        <span class="nav-badge" id="badge-cats">0</span>
      </div>
      <div class="nav-item" id="nav-cocktails" onclick="showPage('cocktails')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 22h8M12 11v11M3 3l9 8 9-8H3z"/></svg>
        Kokteyller
        <span class="nav-badge" id="badge-cocktails">0</span>
      </div>
      <div class="nav-sep"></div>
      <div class="nav-item" id="nav-drafts" onclick="showPage('drafts')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        Taslaklar
        <span class="nav-badge" id="badge-drafts" style="background:rgba(224,92,92,.2);color:#e05c5c">0</span>
      </div>
    </aside>
    <main id="page-content">
      <div class="loading-full"><div class="spinner"></div> Yükleniyor…</div>
    </main>
  </div>
</div>

<div id="modal" style="display:none" class="modal-ov" onclick="closeModalOv(event)">
  <div class="modal" id="modal-box">
    <div class="modal-hd">
      <div class="modal-ttl" id="modal-ttl"></div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-bd" id="modal-bd"></div>
    <div class="modal-ft" id="modal-ft"></div>
  </div>
</div>

<script>
// ── SECURITY: HTML escape — tüm user datası bu fonksiyondan geçecek ─────────
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── CONSTANTS ────────────────────────────────────────────────────────────────

};
const COUNTRY_ISO = FLAG_EMOJI;

function getFlagEmoji(c){ const iso=COUNTRY_ISO[c]; return iso?`🏳`:'🌍'; }
const COUNTRIES = [
  'Albania','Argentina','Armenia','Australia','Austria','Azerbaijan',

  'Canada','Chile','China','Colombia','Croatia','Cuba','Czech Republic',

  'Indonesia','Ireland','Israel','Italy','Jamaica','Japan','Kazakhstan',
  'Kenya','Latvia','Lebanon','Malaysia','Mexico','Morocco',

function togglePass(){

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  if(!email||!pass){showErr('E-posta ve şifre gerekli');return;}
  btn.disabled=true; btn.textContent='Giriş yapılıyor…'; err.style.display='none';
  try{
    const res = await fetch('/.netlify/identity/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:`grant_type=password&username=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}`
    });
    if(!res.ok){
      const d=await res.json().catch(()=>({}));
      throw new Error(d.error_description||d.msg||'Hatalı e-posta veya şifre');
    }
    const data=await res.json();
    token=data.access_token;
    sessionStorage.setItem('mb_token',token);
    sessionStorage.setItem('mb_exp',Date.now()+(data.expires_in||3600)*1000);
    showAdmin(); await loadAll();
  }catch(e){
    showErr(e.message);
    btn.disabled=false; btn.textContent='Giriş Yap';
  }
}
function showErr(msg){const e=document.getElementById('login-err');if(e){e.textContent=msg;e.style.display='block';}}

(function(){

})();

// ── GIT API ───────────────────────────────────────────────────────────────────
function u2b(s){return btoa(unescape(encodeURIComponent(s)));}
function b2u(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))));}
async function gitGet(p){
  const r=await fetch(GIT+p,{headers:{'Authorization':'Bearer '+token}});
  if(!r.ok)return null;
  const d=await r.json(); shas[p]=d.sha;
  return JSON.parse(b2u(d.content));
}
async function gitPut(p,data,msg){
  const body={message:msg,content:u2b(JSON.stringify(data,null,2))};
  if(shas[p])body.sha=shas[p];
  const r=await fetch(GIT+p,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.ok){const d=await r.json();shas[p]=d.content?.sha;return true;}
  return false;
}
async function uploadImg(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=async e=>{
      const b64=e.target.result.split(',')[1];
      const ext=file.name.split('.').pop().toLowerCase().replace(/[^a-z0-9]/g,'');
      const fname=`images/uploads/${Date.now()}.${ext}`;
      const r=await fetch(GIT+fname,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({message:'Upload image',content:b64})});
      if(r.ok){const d=await r.json();shas[fname]=d.content?.sha;res('/'+fname);}
      else rej(new Error('Upload başarısız ('+r.status+')'));
    };
    fr.readAsDataURL(file);
  });
}

async function loadAll(){

    else{categories=[...new Set(bottles.map(x=>x.category).filter(Boolean))].map((n,i)=>({id:i+1,name_en:n,name_tr:n}));await saveCats('Init');}

}

function removeImg(idx){
  if(idx >= 0) window._editImages.splice(idx,1);
  refreshGallery();
}
function addMoreImg(){document.getElementById('fif').click();}
function prevImgMulti(input){
  if(!input.files.length)return;
  // Show previews but DON'T store blob URLs in _editImages
  // Real URLs will be added when saveBottle uploads the files
  for(const file of input.files){
    const url=URL.createObjectURL(file);
    // Store blob temporarily for preview only, marked with blob: prefix
    // We'll upload and replace during save
    if(!window._editImages.includes(url)) window._editImages.push(url);
  }
  refreshGallery();
}
function refreshGallery(){
  const gallery=document.getElementById('img-gallery');
  if(!gallery)return;
  gallery.innerHTML=(window._editImages||[]).map((img,i)=>`
    <div style="position:relative;width:80px;height:80px;flex-shrink:0">
      <img src="${img}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:${i===0?'2px solid var(--gold)':'1px solid var(--border)'}"/>
      ${i===0?'<span style="position:absolute;bottom:2px;left:2px;background:rgba(212,168,67,.9);color:#000;font-size:9px;padding:1px 4px;border-radius:4px;font-weight:700">ANA</span>':''}

    </div>`).join('');
}
function addImgFromUrl(url){
  if(!url||!url.startsWith('http'))return;
  if(!window._editImages.includes(url)){window._editImages.push(url);}

}

function prevImg(input){

async function saveBottle(oldSlug,isEdit){
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  const name=document.getElementById('fn').value.trim();
  const slug=document.getElementById('fs').value.trim();
  const country=document.getElementById('fc').value;
  const category=document.getElementById('fcat').value;
  const abv=document.getElementById('fa').value.trim();
  const year=parseInt(document.getElementById('fy').value)||new Date().getFullYear();
  const qty=parseInt(document.getElementById('fq').value)||1;
  const desc_tr=document.getElementById('fdt').value.trim();
  const desc_en=document.getElementById('fde').value.trim();
  const imgFile=document.getElementById('fif').files[0];
  let image=document.getElementById('fiu').value.trim();
  if(!name||!slug){toast('Ad ve slug gerekli','err');btn.disabled=false;btn.textContent='Tekrar';return;}
  if(imgFile){try{image=await uploadImg(imgFile);}catch(e){toast(esc(e.message),'err');btn.disabled=false;btn.textContent='Tekrar';return;}}
  const entry={id:isEdit==='true'?(bottles.find(b=>b.slug===oldSlug)?.id||Date.now()):Date.now(),slug,name,country,category,abv,year,qty,image,desc_tr,desc_en};
  if(isEdit==='true'){const i=bottles.findIndex(b=>b.slug===oldSlug);if(i>=0)bottles[i]=entry;else bottles.push(entry);}
  else{if(bottles.find(b=>b.slug===slug)){toast('Bu slug zaten var','err');btn.disabled=false;btn.textContent='Tekrar';return;}bottles.push(entry);}
  const ok=await saveBottles(isEdit==='true'?`Edit: ${name}`:`Add: ${name}`);
  if(ok){closeModal();renderBottles();}else{btn.disabled=false;btn.textContent='Tekrar';}
}

function confirmDelBottle(slug){
  const b=bottles.find(x=>x.slug===slug);if(!b)return;
  document.getElementById('modal-ttl').textContent='Şişeyi Sil';
  document.getElementById('modal-bd').innerHTML=`<div class="confirm-box">⚠️ <strong>${esc(b.name)}</strong> silinecek. Geri alınamaz.</div><div style="display:flex;align-items:center;gap:10px"><img src="${esc(b.image)}" style="width:52px;height:52px;border-radius:8px;object-fit:cover" onerror="this.style.display='none'"/><div><div style="font-weight:600">${esc(b.name)}</div><div style="font-size:12px;color:var(--sub)">${esc(b.category)} · ${esc(b.country)}</div></div></div>`;
  document.getElementById('modal-ft').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">İptal</button><button class="btn btn-danger" onclick="delBottle('${esc(slug)}')">Evet, Sil</button>`;
  openModal();
}
async function delBottle(slug){bottles=bottles.filter(b=>b.slug!==slug);const ok=await saveBottles('Delete: '+slug);if(ok){closeModal();renderBottles();}}

async function saveCocktail(oldId,isEdit){
  const btn=document.getElementById('csbtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  const name=document.getElementById('cn').value.trim();
  if(!name){toast('Kokteyl adı gerekli','err');btn.disabled=false;btn.textContent='Tekrar';return;}
  const diff=document.getElementById('cd').value;
  const diff_en=document.getElementById('cde').value;
  const time=document.getElementById('ct').value.trim();
  const imgFile=document.getElementById('cif').files[0];
  let image=document.getElementById('ciu').value.trim();
  if(imgFile){try{image=await uploadImg(imgFile);}catch(e){toast(esc(e.message),'err');btn.disabled=false;btn.textContent='Tekrar';return;}}
  const slugs=[...document.querySelectorAll('#slug-grid .bottle-check.selected')].map(el=>el.id.replace('bc-',''));
  const lines=t=>t.split('\n').map(s=>s.trim()).filter(Boolean);
  const ing_tr=lines(document.getElementById('cit').value);
  const ing_en=lines(document.getElementById('cie').value);
  const steps_tr=lines(document.getElementById('cst').value);
  const steps_en=lines(document.getElementById('cse').value);
  const entry={id:isEdit==='true'?(oldId||Date.now()):Date.now(),name,image,diff,diff_en,time,slugs,ing_tr,ing_en,steps_tr,steps_en};
  if(isEdit==='true'){const i=cocktails.findIndex(c=>c.id===oldId);if(i>=0)cocktails[i]=entry;else cocktails.push(entry);}
  else cocktails.push(entry);
  const ok=await saveCocktails(isEdit==='true'?`Edit cocktail: ${name}`:`Add cocktail: ${name}`);
  if(ok){closeModal();renderCocktails();}else{btn.disabled=false;btn.textContent='Tekrar';}
}

async function resizeImg(file, maxPx = 800) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', 0.82).split(',')[1];
      URL.revokeObjectURL(url);
      resolve(b64);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

async function genAI() {
  const btn    = document.getElementById('ai-btn');
  const status = document.getElementById('ai-status');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analiz ediliyor…';
  status.style.display = 'flex';
  status.innerHTML = '🖼️ Görsel işleniyor…';

  try {
    // Get image — required for full mode, optional for desc-only
    let imageBase64 = null, mediaType = 'image/jpeg';
    const imgFile = document.getElementById('fif')?.files?.[0];

    // Also try existing image URL if no file selected
    const existingImgs = (window._editImages||[]).filter(u=>u&&!u.startsWith('blob:'));
    
    if (imgFile) {
      imageBase64 = await resizeImg(imgFile);
      mediaType = imgFile.type || 'image/jpeg';
    } else if (existingImgs.length) {
      // Fetch existing image and convert to base64
      status.innerHTML = '🖼️ Mevcut görsel yükleniyor…';
      try {
        const imgRes = await fetch(existingImgs[0]);
        const blob = await imgRes.blob();
        mediaType = blob.type || 'image/jpeg';
        imageBase64 = await new Promise(res => {
          const r = new FileReader();
          r.onload = e => res(e.target.result.split(',')[1]);
          r.readAsDataURL(blob);
        });
      } catch(e) { /* image fetch failed, continue without */ }
    }

    // No image is ok — AI will use any name/hints available

    status.innerHTML = '🤖 Claude analiz ediyor…';

    const res = await fetch('/.netlify/functions/generate-description', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mode: 'full',
        name: document.getElementById('fn')?.value?.trim() || '',
        imageBase64,
        mediaType,
        categories, // pass category list for AI to pick from
      }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'API hatası');

    // ── Fill ALL form fields ──────────────────────────────────────────────
    // Name
    if (data.name) {
      document.getElementById('fn').value = data.name;
      autoSlug(); // regenerate slug
    }

    // Country — set select + update flag
    if (data.country) {
      const fc = document.getElementById('fc');
      if (fc) {
        // Try exact match first
        const opt = [...fc.options].find(o => o.value === data.country);
        if (opt) fc.value = data.country;
        else {
          // Try case-insensitive
          const opt2 = [...fc.options].find(o => o.value.toLowerCase() === data.country.toLowerCase());
          if (opt2) fc.value = opt2.value;
        }
        updFlag();
      }
    }

    // Category — match by English name
    if (data.category) {
      const fcat = document.getElementById('fcat');
      if (fcat) {
        const opt = [...fcat.options].find(o => o.value.toLowerCase() === data.category.toLowerCase());
        if (opt) fcat.value = opt.value;
      }
    }

    // ABV
    if (data.abv) document.getElementById('fa').value = data.abv;

    // Descriptions
    if (data.desc_tr) document.getElementById('fdt').value = data.desc_tr;
    if (data.desc_en) document.getElementById('fde').value = data.desc_en;

    // Hashtags
    if (data.hashtags && data.hashtags.length) {
      const fhash = document.getElementById('fhash');
      if (fhash) fhash.value = data.hashtags.join(' ');
    }

    // Show what was filled
    const filled = [
      data.name && 'Ad',
      data.country && 'Ülke',
      data.category && 'Kategori',
      data.abv && 'ABV',
      data.desc_tr && 'TR Açıklama',
      data.desc_en && 'EN Açıklama',
      data.hashtags?.length && 'Hashtagler',
    ].filter(Boolean).join(', ');

    status.style.display = 'none';
    toast('✓ Dolduruldu: ' + filled);

  } catch (e) {
    status.innerHTML = '❌ ' + esc(e.message);
    toast('Hata: ' + esc(e.message), 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 8v4l3 3"/></svg> ✨ AI ile Doldur';
  }
}

  btn.innerHTML = '<div class="spinner"></div> Üretiliyor…';
  status.style.display = 'flex';
  status.innerHTML = '🤖 Tarif hazırlanıyor…';

  try {
    // Send bottle names so AI can match them
    const bottleNames = bottles.map(b => ({ slug: b.slug, name: b.name }));

    const res = await fetch('/.netlify/functions/generate-cocktail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, bottleNames: bottleNames.map(b => b.name) }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'API hatası');

    // Fill difficulty
    const cd = document.getElementById('cd');
    const cde = document.getElementById('cde');
    if (cd && data.diff) cd.value = data.diff;
    if (cde && data.diff_en) cde.value = data.diff_en;

    // Fill time
    const ct = document.getElementById('ct');
    if (ct && data.time) ct.value = data.time;

    // Check matching bottle slugs
    if (data.slugs?.length) {
      document.querySelectorAll('#slug-grid .bottle-check').forEach(el => {
        el.classList.remove('selected');
      });
      // Match by slug or by name similarity
      data.slugs.forEach(slug => {
        const el = document.getElementById('bc-' + slug);
        if (el) { el.classList.add('selected'); return; }
        // Try name match as fallback
        const matched = bottleNames.find(b =>
          b.name.toLowerCase().includes(slug.toLowerCase()) ||
          slug.toLowerCase().includes(b.slug)
        );
        if (matched) {
          const el2 = document.getElementById('bc-' + matched.slug);
          if (el2) el2.classList.add('selected');
        }
      });
    }

    // Fill ingredients and steps (textarea, one per line)
    const cit = document.getElementById('cit');
    const cie = document.getElementById('cie');
    const cst = document.getElementById('cst');
    const cse = document.getElementById('cse');
    if (cit && data.ing_tr) cit.value = data.ing_tr.join('\n');
    if (cie && data.ing_en) cie.value = data.ing_en.join('\n');
    if (cst && data.steps_tr) cst.value = data.steps_tr.join('\n');
    if (cse && data.steps_en) cse.value = data.steps_en.join('\n');

    status.style.display = 'none';
    toast('Tarif üretildi ✓ — kontrol edip yayınla');
  } catch (e) {
    status.innerHTML = '❌ ' + esc(e.message);
    toast('Hata: ' + esc(e.message), 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 8v4l3 3"/></svg> AI ile Doldur';
  }
}

let analyzeQueue = [];
let analyzeRunning = false;

async function analyzeDraft(slug){
  const b = bottles.find(x=>x.slug===slug);
  if(!b || !b.image) { toast('Görsel bulunamadı','err'); return; }

  const btn = document.getElementById('ai-btn-'+slug);
  const nameEl = document.getElementById('draft-name-'+slug);
  const statusEl = document.getElementById('draft-status-'+slug);
  const card = document.getElementById('draft-card-'+slug);
  
  if(btn){ btn.disabled=true; btn.innerHTML='<div class="spinner"></div>'; }
  if(statusEl) statusEl.textContent='Analiz ediliyor…';

  try {
    // Build full URL for the image
    const imgUrl = b.image.startsWith('http') ? b.image : (window.location.origin + b.image);
    
    const res = await fetch('/.netlify/functions/analyze-bottle-image', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ imageUrl: imgUrl, slug })
    });
    
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'API hatası');
    
    // Update bottle in-memory — keep original slug to avoid lookup issues
    const idx = bottles.findIndex(x=>x.slug===slug);
    if(idx>=0){
      bottles[idx] = {
        ...bottles[idx],
        name:     data.name     || bottles[idx].name,
        country:  data.country  || bottles[idx].country,
        category: data.category || bottles[idx].category,
        abv:      data.abv      || bottles[idx].abv,
        desc_tr:  data.desc_tr  || '',
        desc_en:  data.desc_en  || '',
        // Keep slug, status, active, image, images unchanged
      };
    }
    
    if(nameEl) nameEl.textContent = data.name || slug;
    if(statusEl) statusEl.innerHTML = '<span style="color:var(--green)">✓ Analiz tamam — düzenleyip yayınla</span>';
    if(card) card.style.border='1px solid rgba(82,201,122,.5)';
    // Edit button now opens the bottle using SAME slug (unchanged)
    if(btn){
      btn.disabled=false;
      btn.innerHTML='✎ Düzenle';
      btn.style.background='linear-gradient(135deg,#1a3a8a,#2d5fd4)';
      btn.style.color='#fff';
      btn.style.border='none';
      btn.onclick=()=>openEditBottle(slug);
    }
    
    // Auto-save after analysis
    await saveBottles('AI analyze: '+slug);
    
  } catch(e){
    if(statusEl) statusEl.innerHTML='<span style="color:var(--red)">✗ '+esc(e.message)+'</span>';
    if(btn){ btn.disabled=false; btn.innerHTML='🤖 Tekrar'; }
    toast('Hata: '+esc(e.message),'err');
  }
}

async function analyzeAllDrafts(){
  const pending = bottles.filter(b=>b.status==='draft'&&b.image);
  if(!pending.length){ toast('Analiz edilecek taslak yok'); return; }
  
  const batchBtn = document.getElementById('batch-btn');
  if(batchBtn){ batchBtn.disabled=true; batchBtn.textContent=`Analiz ediliyor (0/${pending.length})…`; }
  
  let done = 0;
  // Process one by one to avoid rate limits
  for(const b of pending){
    await analyzeDraft(b.slug);
    done++;
    if(batchBtn) batchBtn.textContent=`Analiz ediliyor (${done}/${pending.length})…`;
    await new Promise(r=>setTimeout(r,800)); // small delay between requests
  }
  
  if(batchBtn){ batchBtn.disabled=false; batchBtn.textContent='Tümünü Analiz Et'; }
  toast(`${done} taslak analiz edildi ✓`);
}


// ── INSTAGRAM SHARING ─────────────────────────────────────────────────────────
const SITE_URL = 'https://miniaturebottles5cl.com';

function buildCaption(b) {
  const lines = [];
  lines.push(b.name);
  lines.push('');
  if(b.desc_tr) lines.push(b.desc_tr);
  if(b.desc_tr && b.desc_en) lines.push('\n---------\n');
  if(b.desc_en) lines.push(b.desc_en);
  lines.push('');
  if(b.gift_from) lines.push(`🎁 @${b.gift_from.replace('@','')} teşekkürler`);
  lines.push('');
  if(b.hashtags && b.hashtags.length) lines.push(b.hashtags.join(' '));
  return lines.join('\n').trim();
}

function openShareModal(slug) {
  const b = bottles.find(x=>x.slug===slug);
  if(!b) return;
  const imageUrl = b.image ? (b.image.startsWith('http') ? b.image : SITE_URL + b.image) : '';
  const caption = buildCaption(b);
  
  document.getElementById('modal-ttl').textContent = 'Instagram Paylasimi';
  document.getElementById('modal-bd').innerHTML = `
    <div style="display:grid;grid-template-columns:120px 1fr;gap:16px;align-items:start">
      ${imageUrl ? `<img src="${esc(imageUrl)}" style="width:120px;height:120px;object-fit:cover;border-radius:10px;border:1px solid var(--border)"/>` : '<div style="width:120px;height:120px;background:var(--surface);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:32px">📷</div>'}
      <div>
        <div style="font-weight:600;font-size:14px;margin-bottom:4px">${esc(b.name)}</div>
        <div style="font-size:11px;color:var(--sub)">${esc(b.category)} · ${esc(b.country)}</div>
        ${!imageUrl ? '<div style="margin-top:8px;padding:8px;background:var(--redd);border-radius:8px;font-size:12px;color:var(--red)">⚠️ Görsel yok — önce görsel ekle</div>' : ''}
      </div>
    </div>
    <div style="margin-top:14px">
      <label style="font-size:11px;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;font-weight:600">Caption</label>
      <textarea id="ig-caption" style="width:100%;margin-top:6px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:13px;resize:vertical;min-height:160px">${esc(caption)}</textarea>
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--sub)">
      Görsel URL: <span style="color:var(--blue)">${esc(imageUrl||'(yok)')}</span>
    </div>`;
  document.getElementById('modal-ft').innerHTML = `

      📸 Instagram'da Paylaş
    </button>`;
  openModal();
}

async function doPostToInstagram(slug) {
  const b = bottles.find(x=>x.slug===slug);
  if(!b) return;
  const btn = document.getElementById('ig-post-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Paylaşılıyor…';
  
  const imageUrl = b.image.startsWith('http') ? b.image : SITE_URL + b.image;
  const caption = document.getElementById('ig-caption').value;

  try {
    const res = await fetch('/.netlify/functions/post-to-instagram', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ imageUrl, caption })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||'Paylaşım başarısız');
    
    // Update bottle with ig_posted status
    const idx = bottles.findIndex(x=>x.slug===slug);
    if(idx>=0){
      bottles[idx].ig_posted = true;
      bottles[idx].ig_posted_at = new Date().toISOString().split('T')[0];
      bottles[idx].ig_post_id = data.ig_post_id||'';
      await saveBottles('Instagram post: '+b.name);
    }
    
    closeModal();
    toast("Instagram'da paylasildi!");
    renderBottles();
    
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = "Paylas";
    toast('Hata: '+esc(e.message),'err');
  }
}

function openIgPost(slug) {
  const b = bottles.find(x=>x.slug===slug);
  if(!b) return;
  if(b.ig_post_id) {
    window.open('https://www.instagram.com/p/'+b.ig_post_id+'/', '_blank');
  } else {
    // Show info modal
    document.getElementById('modal-ttl').textContent = '✓ Instagram Paylaşımı';
    document.getElementById('modal-bd').innerHTML = `
      <div style="font-size:13px;color:var(--text)">
        <div style="font-weight:600;margin-bottom:8px">${esc(b.name)}</div>
        <div style="color:var(--sub)">Paylaşım tarihi: ${esc(b.ig_posted_at||'bilinmiyor')}</div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="resetIgPost('${esc(slug)}')">Paylaşılmadı olarak işaretle</button>
        </div>
      </div>`;
    document.getElementById('modal-ft').innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Kapat</button>`;
    openModal();
  }
}

async function resetIgPost(slug) {
  const idx = bottles.findIndex(b=>b.slug===slug);
  if(idx<0) return;
  bottles[idx].ig_posted = false;
  bottles[idx].ig_posted_at = '';
  bottles[idx].ig_post_id = '';
  await saveBottles('Reset IG post: '+slug);
  closeModal();
  renderBottles();
  toast("Paylasim durumu sifirland");
}

// ── ACTIVE TOGGLE ─────────────────────────────────────────────────────────────
async function toggleActive(type, id) {
  if (type === 'bottle') {
    const b = bottles.find(x => x.slug === id);
    if (!b) return;
    b.active = b.active === false ? true : false;
    const ok = await saveBottles((b.active ? 'Activate' : 'Deactivate') + ': ' + b.name);
    if (ok) renderBottles();
  } else if (type === 'cocktail') {
    const c = cocktails.find(x => x.id === id);
    if (!c) return;
    c.active = c.active === false ? true : false;
    const ok = await saveCocktails((c.active ? 'Activate' : 'Deactivate') + ': ' + c.name);
    if (ok) renderCocktails();
  } else if (type === 'cat') {
    const c = categories.find(x => x.id === id);
    if (!c) return;
    c.active = c.active === false ? true : false;
    const ok = await saveCats((c.active ? 'Activate' : 'Deactivate') + ': ' + c.name_en);
    if (ok) renderCategories();
  }
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function abvFmt(v){
  if(!v) return '';
  v = String(v).trim();
  if(!v.includes('%')) v += '%';
  return v;
}

function toggleSidebar(){
  const aside=document.querySelector('aside');
  const overlay=document.getElementById('sidebar-overlay');
  if(!aside||!overlay)return;
  const open=aside.classList.toggle('open');
  overlay.classList.toggle('visible',open);
}
function closeSidebar(){
  document.querySelector('aside')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('visible');
}

function openModal(){document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}
let _mdTarget=null;
document.addEventListener('mousedown',e=>{_mdTarget=e.target;});
document.addEventListener('touchstart',e=>{_mdTarget=e.target;},{passive:true});
function closeModalOv(e){
  // Only close if BOTH mousedown and mouseup/click fired on the overlay (not while selecting text)
  const overlay=document.getElementById('modal');
  if(e.target===overlay && _mdTarget===overlay) closeModal();
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg,type='ok'){
  let el=document.getElementById('_toast');
  const html=`<span>${type==='ok'?'✓':'✕'}</span><span>${msg}</span>`;
  if(!el){el=document.createElement('div');el.id='_toast';document.body.appendChild(el);}
  el.className=`toast ${type}`;el.innerHTML=html;
  clearTimeout(_tt);_tt=setTimeout(()=>el.remove(),3000);
}
