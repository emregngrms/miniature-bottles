backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "bottles_data"
    label: "Şişeler"
    files:
      - name: "bottles"
        label: "Şişe Koleksiyonu"
        file: "data/bottles.json"
        fields:
          - name: "items"
            label: "Şişeler"
            label_singular: "Şişe"
            widget: "list"
            summary: "{{fields.name}} — {{fields.country}}"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int", hint: "Benzersiz numara ver" }
              - { label: "Şişe Adı", name: "name", widget: "string" }
              - { label: "Slug (URL)", name: "slug", widget: "string", hint: "Küçük harf, tireli. Örn: glenfiddich-12" }
              - label: "Ülke"
                name: "country"
                widget: "select"
                options:
                  - Scotland
                  - Ireland
                  - USA
                  - France
                  - Mexico
                  - Italy
                  - Germany
                  - Venezuela
                  - Spain
                  - Japan
                  - Canada
                  - Australia
                  - Netherlands
                  - Sweden
                  - Russia
                  - Turkey
                  - Greece
                  - Cuba
                  - Jamaica
                  - Barbados
                  - Trinidad
                  - Peru
                  - Brazil
                  - Argentina
                  - South Africa
                  - India
                  - China
                  - Taiwan
                  - Czech Republic
                  - Poland
                  - Hungary
                  - Austria
                  - Switzerland
                  - Belgium
                  - Portugal
                  - England
                  - Diğer
              - { label: "Kategori", name: "category", widget: "string", hint: "Örn: Single Malt Whisky, Gin, Rum, Vodka, Tequila…" }
              - { label: "Alkol Oranı (ABV)", name: "abv", widget: "string", hint: "Örn: 40%" }
              - { label: "Koleksiyona Giriş Yılı", name: "year", widget: "number", value_type: "int" }
              - { label: "Adet", name: "qty", widget: "number", value_type: "int", default: 1, hint: "1'den fazlaysa Fazlalıklar sayfasında görünür" }
              - { label: "Fotoğraf", name: "image", widget: "image" }
              - { label: "Açıklama (Türkçe)", name: "desc_tr", widget: "text" }
              - { label: "Açıklama (İngilizce)", name: "desc_en", widget: "text" }

  - name: "cocktails_data"
    label: "Kokteyller"
    files:
      - name: "cocktails"
        label: "Kokteyl Tarifleri"
        file: "data/cocktails.json"
        fields:
          - name: "items"
            label: "Kokteyller"
            label_singular: "Kokteyl"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int" }
              - { label: "Kokteyl Adı", name: "name", widget: "string" }
              - { label: "Fotoğraf", name: "image", widget: "image" }
              - label: "Zorluk (TR)"
                name: "diff"
                widget: "select"
                options: ["Kolay", "Orta", "Zor"]
              - label: "Zorluk (EN)"
                name: "diff_en"
                widget: "select"
                options: ["Easy", "Medium", "Hard"]
              - { label: "Süre", name: "time", widget: "string", hint: "Örn: 5 dk" }
              - label: "Kullanılan Şişe Slug'ları"
                name: "slugs"
                widget: "list"
                hint: "Her şişenin slug'ını ayrı satıra yaz. Örn: glenfiddich-12"
                field: { label: "Slug", name: "slug", widget: "string" }
              - label: "Malzemeler (Türkçe)"
                name: "ing_tr"
                widget: "list"
                field: { label: "Malzeme", name: "item", widget: "string" }
              - label: "Malzemeler (İngilizce)"
                name: "ing_en"
                widget: "list"
                field: { label: "Ingredient", name: "item", widget: "string" }
              - label: "Hazırlanış (Türkçe)"
                name: "steps_tr"
                widget: "list"
                field: { label: "Adım", name: "step", widget: "string" }
              - label: "Hazırlanış (İngilizce)"
                name: "steps_en"
                widget: "list"
                field: { label: "Step", name: "step", widget: "string" }
